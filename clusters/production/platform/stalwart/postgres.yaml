# Postgres for Stalwart. CNPG StatefulSet managed by the cnpg-system
# operator — same pattern as veron-db / hasso-db / discourse-db. The
# password is auto-generated into Secret/stalwart-db-app, consumed by
# the Stalwart StatefulSet via the STALWART_DB_PASSWORD env var.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: stalwart-db
  namespace: platform
spec:
  inheritedMetadata:
    annotations:
      resource.opentelemetry.io/service.name: stalwart-db
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 20Gi
    storageClass: hcloud-volumes
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
  bootstrap:
    initdb:
      database: stalwart
      owner: stalwart
  monitoring:
    enablePodMonitor: false
