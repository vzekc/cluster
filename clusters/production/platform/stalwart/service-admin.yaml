apiVersion: v1
kind: Service
metadata:
  name: stalwart-admin
  namespace: platform
  labels:
    app: stalwart
spec:
  # ClusterIP only — NOT a Traefik target. Kept for in-cluster callers
  # that need to hit Stalwart's plain-HTTP admin/JMAP endpoint on :8080
  # (currently the stalwart-apply Job and, in future, any other pod
  # that wants to programmatically configure or monitor Stalwart).
  # External admin-UI access happens directly on the node at
  # https://post.classic-computing.de/ via hostPort 443.
  type: ClusterIP
  selector:
    app: stalwart
    component: server
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
