apiVersion: v1
kind: Service
metadata:
  name: stalwart-admin
  namespace: platform
  labels:
    app: stalwart
spec:
  # ClusterIP — only Traefik reaches this, via the Ingress.
  type: ClusterIP
  selector:
    app: stalwart
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
