# Syncs the Secret/post-tls cert cert-manager issues into Stalwart's
# x:Certificate registry via JMAP. Runs hourly; rotations (cert-manager
# re-issues every ~30 days) are covered within one CronJob interval.
#
# Flow per run:
#   1. Read /certs/tls.crt + /certs/tls.key from the mounted Secret.
#   2. Look up any existing x:Certificate matching the post SAN list.
#   3. Create or update that Certificate with the PEM.
#   4. Point SystemSettings.defaultCertificateId at it (so every TLS
#      listener — SMTP/IMAP/admin — picks it up via SNI).
#   5. Fire x:Action ReloadTlsCertificates so the pod adopts the cert
#      without a restart.
#
# Idempotent — second run with identical cert is a no-op.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stalwart-cert-sync
  namespace: platform
  labels:
    app: stalwart
    component: cert-sync
spec:
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: stalwart
            component: cert-sync
        spec:
          restartPolicy: OnFailure
          serviceAccountName: stalwart-apply
          volumes:
            - name: cert
              secret:
                secretName: post-tls
                optional: true
          containers:
            - name: sync
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              env:
                - name: FALLBACK_ADMIN_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: stalwart-secrets
                      key: FALLBACK_ADMIN_SECRET
                - name: JMAP
                  value: http://stalwart-headless.platform.svc.cluster.local:8080/jmap
                - name: ACCT
                  value: d333333
                - name: DOMAIN_CN
                  value: post.classic-computing.de
              volumeMounts:
                - name: cert
                  mountPath: /certs
                  readOnly: true
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  apk add --no-cache curl jq bash >/dev/null
                  exec /bin/bash -s <<'SYNC_EOF'
                  set -eu
                  AUTH="admin:$FALLBACK_ADMIN_SECRET"

                  if [ ! -s /certs/tls.crt ] || [ ! -s /certs/tls.key ]; then
                    echo "Secret/post-tls not populated yet (cert-manager still issuing?)."
                    echo "Retry on next schedule."
                    exit 0
                  fi

                  CRT=$(cat /certs/tls.crt)
                  KEY=$(cat /certs/tls.key)

                  CERT_OBJ=$(jq -n --arg c "$CRT" --arg k "$KEY" '{
                    certificate: {"@type":"Text", value: $c},
                    privateKey:  {"@type":"Text", secret: $k}
                  }')

                  jpost() {
                    curl -sSf --retry 5 --retry-delay 2 --retry-connrefused \
                      -u "$AUTH" -H 'Content-Type: application/json' \
                      -X POST --data @- "$JMAP"
                  }

                  echo "== look up existing x:Certificate for $DOMAIN_CN =="
                  existing=$(jpost <<EOF
                  {"using":["urn:ietf:params:jmap:core"],"methodCalls":[
                    ["x:Certificate/query",{"accountId":"$ACCT"},"c0"],
                    ["x:Certificate/get",{"accountId":"$ACCT","#ids":{"resultOf":"c0","name":"x:Certificate/query","path":"/ids"},"properties":["subjectAlternativeNames"]},"c1"]
                  ]}
                  EOF
                  )
                  cert_id=$(jq -r --arg cn "$DOMAIN_CN" '
                    .methodResponses[1][1].list[]?
                    | select(.subjectAlternativeNames[$cn] // false)
                    | .id' <<< "$existing" | head -1)

                  if [ -n "$cert_id" ]; then
                    echo "Updating Certificate id=$cert_id"
                    payload=$(jq -n --argjson obj "$CERT_OBJ" --arg id "$cert_id" \
                      '{using: ["urn:ietf:params:jmap:core"],
                        methodCalls: [["x:Certificate/set",
                                       {accountId: "'"$ACCT"'",
                                        update: {($id): $obj}},
                                       "c0"]]}')
                  else
                    echo "Creating new Certificate"
                    payload=$(jq -n --argjson obj "$CERT_OBJ" \
                      '{using: ["urn:ietf:params:jmap:core"],
                        methodCalls: [["x:Certificate/set",
                                       {accountId: "'"$ACCT"'",
                                        create: {cert_post: $obj}},
                                       "c0"]]}')
                  fi
                  resp=$(echo "$payload" | jpost)
                  echo "$resp" | jq .

                  new_id=$(jq -r '
                    .methodResponses[0][1].created.cert_post.id //
                    (.methodResponses[0][1].updated | keys? // [] | .[0]) //
                    empty' <<< "$resp")
                  if [ -z "$new_id" ]; then new_id="$cert_id"; fi
                  echo "Certificate id=$new_id"

                  echo "== set SystemSettings.defaultCertificateId =="
                  jpost <<EOF | jq '.methodResponses[0][1] | del(.list)'
                  {"using":["urn:ietf:params:jmap:core"],"methodCalls":[
                    ["x:SystemSettings/set",{"accountId":"$ACCT","update":{"singleton":{"defaultCertificateId":"$new_id"}}},"c0"]
                  ]}
                  EOF

                  echo "== ReloadTlsCertificates =="
                  jpost <<EOF | jq .
                  {"using":["urn:ietf:params:jmap:core"],"methodCalls":[
                    ["x:Action/set",{"accountId":"$ACCT","create":{"r":{"@type":"ReloadTlsCertificates"}}},"c0"]
                  ]}
                  EOF

                  echo "Cert sync complete."
                  SYNC_EOF
