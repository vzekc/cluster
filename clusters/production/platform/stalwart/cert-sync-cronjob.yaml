# Syncs the post.classic-computing.de certificate cert-manager issues
# (Secret/post-tls) into Stalwart's data store. Every hour:
#   1. Read tls.crt and tls.key out of the Secret
#   2. Query Stalwart for existing x:Certificate
#   3. Create or update a single Certificate object with the PEM
#   4. Ensure SystemSettings.defaultCertificateId points at it
#   5. Fire x:Action ReloadTlsCertificates so Stalwart's listeners
#      pick up the new cert without a full pod restart
#
# Idempotent — if the cert in Stalwart already matches the Secret,
# every step is a no-op. Safe to run ahead of schedule too
# (kubectl create job --from=cronjob/... for rotation emergencies).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stalwart-cert-sync
  namespace: platform
  labels:
    app: stalwart
    component: cert-sync
spec:
  # Hourly is plenty given LE certs live 90 days and renew at 30 days.
  # Rotation-to-effective latency ≤ 1 h; first-deploy latency ≤ 1 h
  # + however long DNS-01 takes (usually 1–5 min).
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: stalwart
            component: cert-sync
        spec:
          restartPolicy: OnFailure
          serviceAccountName: stalwart-apply
          volumes:
            - name: cert
              secret:
                secretName: post-tls
                optional: true
          containers:
            - name: sync
              image: alpine:3.20
              imagePullPolicy: IfNotPresent
              env:
                - name: FALLBACK_ADMIN_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: stalwart-secrets
                      key: FALLBACK_ADMIN_SECRET
                - name: JMAP
                  value: http://stalwart-admin.platform.svc.cluster.local/jmap
                - name: ACCT
                  value: d333333
                - name: DOMAIN_CN
                  value: post.classic-computing.de
              volumeMounts:
                - name: cert
                  mountPath: /certs
                  readOnly: true
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  apk add --no-cache curl jq bash >/dev/null
                  exec /bin/bash -s <<'SYNC_EOF'
                  set -eu
                  AUTH="admin:$FALLBACK_ADMIN_SECRET"

                  if [ ! -s /certs/tls.crt ] || [ ! -s /certs/tls.key ]; then
                    echo "Secret/post-tls not populated yet (cert-manager still issuing?)."
                    echo "Will retry on next schedule."
                    exit 0
                  fi

                  CRT=$(cat /certs/tls.crt)
                  KEY=$(cat /certs/tls.key)

                  # Build JMAP payloads with jq so PEM newlines survive
                  # JSON serialization correctly. Inline cat+jq instead
                  # of here-strings so we don't depend on bash-ism.
                  CERT_OBJ=$(jq -n --arg c "$CRT" --arg k "$KEY" '{
                    certificate: {"@type":"Text", value: $c},
                    privateKey:  {"@type":"Text", secret: $k}
                  }')

                  jpost() {
                    curl -sSf --retry 5 --retry-delay 2 --retry-connrefused \
                      -u "$AUTH" -H 'Content-Type: application/json' \
                      -X POST --data @- "$JMAP"
                  }

                  echo "== Looking up existing Stalwart Certificate for $DOMAIN_CN =="
                  existing=$(jpost <<EOF
                  {"using":["urn:ietf:params:jmap:core"],"methodCalls":[
                    ["x:Certificate/query",{"accountId":"$ACCT"},"c0"],
                    ["x:Certificate/get",{"accountId":"$ACCT","#ids":{"resultOf":"c0","name":"x:Certificate/query","path":"/ids"},"properties":["subjectAlternativeNames","notValidAfter"]},"c1"]
                  ]}
                  EOF
                  )
                  cert_id=$(jq -r --arg cn "$DOMAIN_CN" '
                    .methodResponses[1][1].list[]?
                    | select(.subjectAlternativeNames[$cn] // false)
                    | .id' <<< "$existing" | head -1)

                  if [ -n "$cert_id" ]; then
                    echo "Updating Certificate id=$cert_id"
                    payload=$(jq -n --argjson obj "$CERT_OBJ" --arg id "$cert_id" \
                      '{using: ["urn:ietf:params:jmap:core"],
                        methodCalls: [["x:Certificate/set",
                                       {accountId: "'"$ACCT"'",
                                        update: {($id): $obj}},
                                       "c0"]]}')
                  else
                    echo "Creating new Certificate"
                    payload=$(jq -n --argjson obj "$CERT_OBJ" \
                      '{using: ["urn:ietf:params:jmap:core"],
                        methodCalls: [["x:Certificate/set",
                                       {accountId: "'"$ACCT"'",
                                        create: {cert_post: $obj}},
                                       "c0"]]}')
                  fi
                  resp=$(echo "$payload" | jpost)
                  echo "$resp" | jq .

                  # Extract the id (freshly created, or the existing one).
                  new_id=$(jq -r '
                    .methodResponses[0][1].created.cert_post.id //
                    .methodResponses[0][1].updated | keys? // [] | .[0] //
                    empty' <<< "$resp")
                  if [ -z "$new_id" ]; then new_id="$cert_id"; fi
                  echo "Certificate id=$new_id"

                  echo "== Pointing SystemSettings.defaultCertificateId =="
                  jpost <<EOF | jq '.methodResponses[0][1] | del(.list)'
                  {"using":["urn:ietf:params:jmap:core"],"methodCalls":[
                    ["x:SystemSettings/set",{"accountId":"$ACCT","update":{"singleton":{"defaultCertificateId":"$new_id"}}},"c0"]
                  ]}
                  EOF

                  echo "== Firing ReloadTlsCertificates =="
                  jpost <<EOF | jq .
                  {"using":["urn:ietf:params:jmap:core"],"methodCalls":[
                    ["x:Action/set",{"accountId":"$ACCT","create":{"r":{"@type":"ReloadTlsCertificates"}}},"c0"]
                  ]}
                  EOF

                  echo "Cert sync complete."
                  SYNC_EOF
