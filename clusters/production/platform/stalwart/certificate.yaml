# post-tls: the TLS certificate for Stalwart. cert-manager issues it
# via the Hetzner DNS-01 webhook (see infrastructure/cluster-issuer.yaml)
# so we control the SAN list precisely — Stalwart's own ACME in 0.16
# auto-expands SANs but omits the primary Domain name, breaking mail-
# client TLS verification.
#
# Four auto-config subdomains match what Stalwart serves anyway (it
# publishes autoconfig / autodiscover endpoints and the mta-sts HTTPS
# policy). Keeping them in-cert means clients that do discovery don't
# see cert warnings.
#
# The resulting Secret/post-tls is consumed by stalwart-cert-sync
# (cert-sync-cronjob.yaml): it POSTs the PEM into Stalwart via JMAP
# and sets SystemSettings.defaultCertificateId.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: post-tls
  namespace: platform
spec:
  secretName: post-tls
  issuerRef:
    name: letsencrypt-prod-dns01-hetzner
    kind: ClusterIssuer
  commonName: post.classic-computing.de
  dnsNames:
    - post.classic-computing.de
    - autoconfig.post.classic-computing.de
    - autodiscover.post.classic-computing.de
    - mta-sts.post.classic-computing.de
    - ua-auto-config.post.classic-computing.de
  # RSA rather than ECDSA — a handful of older MTAs still refuse EC
  # certs over SMTP STARTTLS. 2048 is fine.
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  duration: 2160h   # 90d (LE max)
  renewBefore: 720h # 30d
