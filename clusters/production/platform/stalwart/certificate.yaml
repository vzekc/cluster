# cert-manager issues the post.classic-computing.de cert via DNS-01
# (the Hetzner webhook in cert-manager namespace). Stalwart's built-in
# ACME is off because 0.16 silently fails to process its own
# AcmeRenewal tasks in our environment — see apply-job.yaml Phase 2
# where every Domain has certificateManagement=Manual.
#
# The resulting Secret is consumed by stalwart-apply's Phase 7, which
# POSTs the PEM into Stalwart's `x:Certificate` singleton via JMAP and
# sets SystemSettings.defaultCertificateId so every TLS listener
# (SMTP/IMAP/admin UI) picks it up.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: post-tls
  namespace: platform
spec:
  secretName: post-tls
  issuerRef:
    name: letsencrypt-prod-dns01-hetzner
    kind: ClusterIssuer
  commonName: post.classic-computing.de
  dnsNames:
    - post.classic-computing.de
  # RSA rather than ECDSA because a handful of older receiving MTAs
  # still choke on EC certs over SMTP STARTTLS. 2048 is fine.
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  duration: 2160h   # 90d, LE max
  renewBefore: 720h # 30d
