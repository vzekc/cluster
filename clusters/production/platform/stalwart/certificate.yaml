# Only the admin UI cert is managed by cert-manager. Stalwart's mail
# cert (post.classic-computing.de) cannot use HTTP-01 via Traefik
# because post resolves to the agent node's public IP (to match rDNS,
# see cluster-infra/terraform/dns.tf) — not to the LB. Stalwart solves
# this with its built-in ACME client: it listens on port 80 via hostPort
# on the agent node and obtains its own cert. See configmap.toml for
# the [acme.*] block.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stalwart-admin-tls
  namespace: platform
spec:
  secretName: stalwart-admin-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: stalwart.classic-computing.de
  dnsNames:
    - stalwart.classic-computing.de
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  duration: 2160h
  renewBefore: 720h
