apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: platform
data:
  # Stalwart 0.16 reads only the DataStore object from config.json;
  # every other setting lives in the database once bootstrap finishes.
  # Postgres (vs. the chart default RocksDB) chosen so data + blob +
  # search + in-memory all live in one backend that's already managed
  # by CNPG. Secret is interpolated via the EnvironmentVariable
  # wrapper — Stalwart reads STALWART_DB_PASSWORD out of the env at
  # startup.
  config.json: |
    {
      "@type": "PostgreSql",
      "host": "stalwart-db-rw.platform.svc.cluster.local",
      "port": 5432,
      "database": "stalwart",
      "authUsername": "stalwart",
      "authSecret": {
        "@type": "EnvironmentVariable",
        "variableName": "STALWART_DB_PASSWORD"
      },
      "useTls": false,
      "poolMaxConnections": 10,
      "timeout": 15000
    }
