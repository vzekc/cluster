apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: platform
data:
  # Stalwart 0.16 changed the config model: this file is ONLY a DataStore
  # descriptor. Everything else (listeners, ACME, TLS certs, domains,
  # DKIM keys, directories, admin users) lives inside the data store as
  # typed objects and is managed via the webadmin or JMAP `x:*/set`
  # calls. There is no longer a file-driven full-config mode.
  #
  # Workflow for this cluster:
  #   1. This ConfigMap gets mounted at /etc/stalwart/config.json
  #      (matches the image entrypoint `stalwart --config /etc/stalwart/config.json`).
  #   2. Stalwart boots, connects to stalwart-db, auto-seeds default
  #      listeners/settings on first run.
  #   3. Operator logs into https://stalwart.classic-computing.de with
  #      admin/<FALLBACK_ADMIN_SECRET> and finishes setup through the UI
  #      (listeners, ACME for post.classic-computing.de, domains, DKIM).
  #   4. Operator exports the resulting state to a backup, commits it
  #      (see the planned init-container --import step). From that point
  #      on rebuilds are fully declarative — any new pod reimports the
  #      backup before serving traffic.
  #
  # @type is the Stalwart schema's tagged-union discriminator. Valid
  # values at top level: RocksDb | Sqlite | FoundationDb | PostgreSql | MySql.
  # authSecret's `EnvironmentVariable` variant tells Stalwart to read
  # the password from the named env var at startup — no string
  # interpolation of ${VAR} is supported in the rest of the file.
  config.json: |
    {
      "@type": "PostgreSql",
      "host": "stalwart-db-rw.platform.svc.cluster.local",
      "port": 5432,
      "database": "stalwart",
      "authUsername": "stalwart",
      "authSecret": {
        "@type": "EnvironmentVariable",
        "variableName": "STORE_PASSWORD"
      },
      "useTls": false,
      "poolMaxConnections": 10,
      "timeout": 15000
    }
