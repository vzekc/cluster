apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stalwart-data
  namespace: platform
spec:
  # Holds Stalwart's runtime state that isn't in Postgres:
  #   - blob store (raw message bodies, ~95% of mail volume)
  #   - queue spool (in-flight outbound messages pre-delivery)
  #   - config overrides written via the admin webadmin UI
  # ReadWriteOnce is fine — Stalwart is a single-replica StatefulSet
  # and the volume never needs to be shared between pods.
  accessModes: [ReadWriteOnce]
  storageClassName: hcloud-volumes
  resources:
    requests:
      storage: 50Gi
