# Minimal RBAC for the stalwart-apply Job. The Job's final phase has
# to delete the Stalwart pod so the Deployment recreates it with
# fresh DB-backed settings (tracers, useXForwarded, …) — Stalwart does
# not hot-reload those. Namespace-scoped; no access outside platform.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stalwart-apply
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stalwart-apply
  namespace: platform
rules:
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, delete]
  # Cert-sync CronJob mounts Secret/post-tls directly, so it doesn't
  # need API-level secret get — but leave it in case we ever shift to
  # kubectl-get-based sync.
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [post-tls]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stalwart-apply
  namespace: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: stalwart-apply
subjects:
  - kind: ServiceAccount
    name: stalwart-apply
    namespace: platform
