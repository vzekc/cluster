apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stalwart
  namespace: platform
  annotations:
    # Bare hostname, not under *.k8s.classic-computing.de — external-dns
    # will create the A/AAAA record pointing at the LB.
    external-dns.alpha.kubernetes.io/hostname: stalwart.classic-computing.de
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts: [stalwart.classic-computing.de]
      secretName: stalwart-admin-tls
  rules:
    - host: stalwart.classic-computing.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stalwart-admin
                port: { number: 80 }
