apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart
  namespace: platform
  labels:
    app: stalwart
spec:
  replicas: 1
  # Recreate (not RollingUpdate) because:
  #   1. The data PVC is RWO and cannot be mounted by two pods.
  #   2. Mail delivery is stateful — two Stalwart processes against one
  #      Postgres would race on the queue and double-deliver.
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app: stalwart
      component: server
  template:
    metadata:
      labels:
        app: stalwart
        component: server
      annotations:
        resource.opentelemetry.io/service.name: stalwart
    spec:
      enableServiceLinks: false
      securityContext:
        # Stalwart's container image runs as a dedicated non-root user;
        # fsGroup lets the pod write to the PVC mount and read the TLS
        # secret regardless of the image's internal uid.
        fsGroup: 1000
      # hostPort binds everything Stalwart needs externally directly to
      # the agent node's public interface (the Hetzner firewall opens
      # those ports — see cluster-infra/terraform/main.tf). There is
      # no Traefik ingress path: post.classic-computing.de resolves to
      # the agent node's public IP, Stalwart terminates its own TLS.
      # This keeps forward-confirmed rDNS aligned for mail and gives
      # the admin UI the same public cert Stalwart's ACME is managing.
      # Pins the pod to whichever node has these ports free — fine with
      # one agent; revisit on scale-out.
      containers:
        - name: stalwart
          # Docker Hub official image. Pin to a tagged release after the
          # initial boot succeeds — `latest` is fine for bring-up but
          # defeats reproducibility for Flux reconciles.
          image: stalwartlabs/stalwart:latest
          imagePullPolicy: IfNotPresent
          ports:
            # :80 is Stalwart's ACME HTTP-01 challenge responder.
            - { name: acme,       containerPort: 80,  hostPort: 80  }
            # :443 is the admin webadmin + JMAP over HTTPS. Stalwart's
            # auto-seeded `https` listener (:443, implicit TLS, protocol
            # http) serves this with whatever certificate its ACME has
            # issued for post.classic-computing.de.
            - { name: https,      containerPort: 443, hostPort: 443 }
            - { name: smtp,       containerPort: 25,  hostPort: 25  }
            - { name: smtps,      containerPort: 465, hostPort: 465 }
            - { name: submission, containerPort: 587, hostPort: 587 }
            - { name: imap,       containerPort: 143, hostPort: 143 }
            - { name: imaps,      containerPort: 993, hostPort: 993 }
            # :8080 stays cluster-internal for kubelet probes and the
            # stalwart-apply Job's in-cluster JMAP calls — it's a plain
            # HTTP endpoint so neither needs TLS.
            - { name: http,       containerPort: 8080 }
          env:
            # Postgres password, read by Stalwart directly via the
            # DataStore's `{@type: EnvironmentVariable}` authSecret.
            - name: STORE_PASSWORD
              valueFrom: { secretKeyRef: { name: stalwart-db-app, key: password } }
            # Admin password as the bare secret. Also composed into
            # STALWART_RECOVERY_ADMIN below.
            - name: FALLBACK_ADMIN_SECRET
              valueFrom: { secretKeyRef: { name: stalwart-secrets, key: FALLBACK_ADMIN_SECRET } }
            # Stalwart reads this to install a fallback superuser that
            # works even against an empty registry (as on first boot).
            # Without it Stalwart prints a random password to stdout
            # once and we'd lose login if the pod restarts before setup.
            - name: STALWART_RECOVERY_ADMIN
              value: "admin:$(FALLBACK_ADMIN_SECRET)"
          volumeMounts:
            # Mount the ConfigMap at Stalwart 0.16's default config dir;
            # the entrypoint is `stalwart --config /etc/stalwart/config.json`.
            - { name: config, mountPath: /etc/stalwart, readOnly: true }
            - { name: data,   mountPath: /var/lib/stalwart }
          # TCP probe on the HTTP admin port. Cheap, no auth required
          # for the probe path (Stalwart answers on :8080 as soon as the
          # listeners are up).
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "2000m", memory: "2Gi" }
      volumes:
        - name: config
          configMap:
            name: stalwart-config
        - name: data
          persistentVolumeClaim:
            claimName: stalwart-data
