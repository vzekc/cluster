# cert-manager DNS-01 webhook — the Hetzner-official one that speaks
# the unified Cloud API at api.hetzner.cloud (the dns.hetzner.com
# console API is gone). Chart ships from the same `charts.hetzner.cloud`
# Helm repo as hcloud-ccm / hcloud-csi, so we reuse the HelmRepository
# already declared in sources.yaml.
#
# Why DNS-01 at all: Stalwart's own ACME (TLS-ALPN-01) produces
# correct-looking SAN certs but won't include the Domain name itself,
# which breaks mail TLS clients. cert-manager DNS-01 lets us spell
# out every hostname explicitly; the resulting Secret is pushed into
# Stalwart's x:Certificate via cert-sync-cronjob.yaml in platform/
# stalwart/.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-webhook-hetzner
  namespace: cert-manager
spec:
  interval: 15m
  releaseName: cert-manager-webhook-hetzner
  chart:
    spec:
      chart: cert-manager-webhook-hetzner
      version: "0.6.x"
      sourceRef:
        kind: HelmRepository
        name: hcloud
        namespace: flux-system
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  values:
    # Default groupName (acme.hetzner.com) is fine; ClusterIssuer below
    # matches it.
    certManager:
      namespace: cert-manager
      serviceAccountName: cert-manager
