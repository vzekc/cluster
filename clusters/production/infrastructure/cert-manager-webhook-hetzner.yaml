# cert-manager webhook that solves DNS-01 challenges via the Hetzner
# DNS API. Installed alongside cert-manager so ClusterIssuers can use
# `solvers.dns01.webhook` to drop a TXT record in the Hetzner zone.
#
# Why DNS-01 at all:
#   post.classic-computing.de A-record points at the agent node's
#   public IP (to keep forward-confirmed rDNS for mail). Traefik
#   doesn't see traffic to that name, so the existing HTTP-01
#   ClusterIssuer can't validate. DNS-01 doesn't care where the name
#   points — it proves zone control via TXT.
#
# The webhook reads the Hetzner DNS API token from a Secret in its
# own namespace (cert-manager). The ClusterIssuer (see
# cluster-issuer.yaml) references this Secret by name; see
# sealed-secrets.yaml in the same dir for the SealedSecret that
# populates it.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-webhook-hetzner
  namespace: cert-manager
spec:
  interval: 15m
  releaseName: cert-manager-webhook-hetzner
  chart:
    spec:
      chart: cert-manager-webhook-hetzner
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: cert-manager-webhook-hetzner
        namespace: flux-system
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  values:
    groupName: acme.classic-computing.de
    certManager:
      namespace: cert-manager
      serviceAccountName: cert-manager
