apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hccm
  namespace: kube-system
spec:
  interval: 15m
  releaseName: hccm
  chart:
    spec:
      chart: hcloud-cloud-controller-manager
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: hcloud
        namespace: flux-system
  values:
    networking:
      enabled: true
    # Token + network come from the `hcloud` Secret in kube-system, which
    # bootstrap-cluster.sh creates. The chart wires those env vars itself.
