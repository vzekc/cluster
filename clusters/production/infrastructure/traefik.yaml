apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 15m
  releaseName: traefik
  chart:
    spec:
      chart: traefik
      version: "34.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    # Listen on NodePorts 30080/30443 so the Hetzner Load Balancer (see
    # cluster-infra/terraform/main.tf) can pass TCP straight through.
    service:
      type: NodePort
      spec:
        externalTrafficPolicy: Local
    ports:
      web:
        port: 8000
        nodePort: 30080
        exposedPort: 80
      websecure:
        port: 8443
        nodePort: 30443
        exposedPort: 443
        tls:
          enabled: true
    providers:
      kubernetesIngress:
        allowExternalNameServices: true
      kubernetesCRD:
        allowCrossNamespace: true
    deployment:
      kind: DaemonSet
    nodeSelector:
      role: agent
    tolerations: []
    logs:
      access:
        enabled: true
        format: json
