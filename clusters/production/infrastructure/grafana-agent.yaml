apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-agent
  namespace: observability
spec:
  interval: 15m
  releaseName: grafana-agent
  chart:
    spec:
      chart: grafana-agent
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  valuesFrom:
    # The `grafana-agent-values` ConfigMap is created out-of-band
    # (bootstrap-cluster.sh installs grafana-agent directly); this lets
    # Flux reconcile the values without storing Grafana Cloud URLs in git.
    - kind: ConfigMap
      name: grafana-agent-values
      optional: true
  values:
    controller:
      type: daemonset
