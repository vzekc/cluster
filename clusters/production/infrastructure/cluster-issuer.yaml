apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: hans@huebner.org
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: traefik
---
# Staging issuer for iterating on cert config without hitting rate limits.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    email: hans@huebner.org
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: traefik
---
# DNS-01 issuer via the Hetzner webhook. Use this for hostnames that
# don't route through Traefik (i.e. anything not at the LB IP). The
# webhook is installed by cert-manager-webhook-hetzner.yaml; its
# Hetzner DNS API token lives in Secret/hetzner-dns-api-token in the
# cert-manager namespace (SealedSecret committed separately).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns01-hetzner
spec:
  acme:
    email: hans@huebner.org
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-dns01-hetzner-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.classic-computing.de
            solverName: hetzner
            config:
              secretName: hetzner-dns-api-token
              zoneName: classic-computing.de
              apiUrl: https://dns.hetzner.com/api/v1
