# The cert-manager-webhook-hetzner Helm chart ships a Role that lets
# its ServiceAccount read a Secret named `hetzner-secret` only. Our
# sealed secret is called `hetzner-dns-api-token` (matches the one
# external-dns uses and what the ClusterIssuer references), so we
# grant the webhook SA extra access here instead of renaming the
# existing sealed secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-webhook-hetzner-dns-api-token
  namespace: cert-manager
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [hetzner-dns-api-token]
    verbs: [get, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-webhook-hetzner-dns-api-token
  namespace: cert-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-webhook-hetzner-dns-api-token
subjects:
  - kind: ServiceAccount
    name: cert-manager-webhook-hetzner
    namespace: cert-manager
