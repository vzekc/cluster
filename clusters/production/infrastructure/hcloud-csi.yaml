apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hcsi
  namespace: kube-system
spec:
  interval: 15m
  releaseName: hcsi
  chart:
    spec:
      chart: hcloud-csi
      version: "2.x"
      sourceRef:
        kind: HelmRepository
        name: hcloud
        namespace: flux-system
  values: {}
  # Chart ships a sensible default StorageClass ("hcloud-volumes", reclaim
  # Delete). If per-workload retention is needed, attach reclaimPolicy at
  # the PVC level or define a second StorageClass in a PR.
