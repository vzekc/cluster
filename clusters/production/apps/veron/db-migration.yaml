# One-shot schema bootstrap. Uses the same image as the app; runs whatever
# the project's migration tooling is under /migrations. Replace the
# command with the real invocation once veron's Dockerfile is finalized.
apiVersion: batch/v1
kind: Job
metadata:
  name: veron-migrate
  namespace: dev
  annotations:
    # Re-run when changed: bump this when schema migrations land.
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: migrate
          image: ghcr.io/vzekc/veron:main
          command: ["/usr/local/bin/veron", "migrate"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: veron-db-app
                  key: uri
