apiVersion: apps/v1
kind: Deployment
metadata:
  name: veron
  namespace: dev
  labels:
    app: veron
spec:
  replicas: 1
  selector:
    matchLabels:
      app: veron
  strategy:
    type: Recreate  # 3270 is stateful; don't run two side-by-side
  template:
    metadata:
      labels:
        app: veron
      annotations:
        # k8s-monitoring / Alloy uses this as the Grafana Cloud service_name.
        resource.opentelemetry.io/service.name: veron
    spec:
      # Kubernetes otherwise injects env vars for every Service in the
      # namespace (<NAME>_PORT=tcp://ip:port, etc). That clobbers veron's
      # own VERON_PORT config var. We don't use the link-style env for
      # service discovery — DNS is fine — so turn them off.
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        # Secret mounts get owned root:root by default; fsGroup is what
        # kubelet chowns the projected files to. Without this, veron
        # (uid 10001) can't read /etc/veron/tls/{tls.crt,tls.key} or
        # /home/veron/.slime-secret.
        fsGroup: 10001
      # Soft-deploy is the default: scripts/soft-deploy-veron.sh (in the
       # cluster-infra repo) execs into this pod and runs
       # /opt/veron/deploy/deploy.sh which git-fetches origin/main and
       # hot-reloads via Swank. Pod restarts only on liveness-probe
       # failure (which automatically pulls the current image via
       # imagePullPolicy: Always) or when somebody explicitly invokes
       # `kubectl rollout restart deployment/veron`.
      terminationGracePeriodSeconds: 30
      containers:
        - name: veron
          image: ghcr.io/vzekc/veron:main
          imagePullPolicy: Always
          ports:
            - { name: tn3270, containerPort: 3270 }
            - { name: swank,  containerPort: 4005 }
          volumeMounts:
            - name: tls
              mountPath: /etc/veron/tls
              readOnly: true
            # Swank reads ~/.slime-secret on startup and requires every
            # connecting client to send this token as the first message.
            # USER in the Dockerfile is uid 10001 with HOME=/home/veron.
            - name: slime-secret
              mountPath: /home/veron/.slime-secret
              subPath: .slime-secret
              readOnly: true
          env:
            - { name: VERON_HOST, value: "0.0.0.0" }
            - { name: VERON_PORT, value: "3270" }
            - { name: SWANK_PORT, value: "4005" }
            # Bind Swank on 0.0.0.0 so Traefik's IngressRouteTCP can
            # reach it. Auth is enforced by the .slime-secret token
            # mounted into the user's home dir (see volumes below).
            - { name: SWANK_HOST, value: "0.0.0.0" }
            # STARTTLS defaults to true; just supply the cert. The
            # secret is reissued before expiry by cert-manager; veron
            # currently loads the cert at startup only, so a reload
            # (or pod restart) is needed to pick up a rotated cert.
            - { name: VERON_TLS_CERT, value: "/etc/veron/tls/tls.crt" }
            - { name: VERON_TLS_KEY,  value: "/etc/veron/tls/tls.key" }
            # veron runs its migrations at process start via
            # (veron:initialize-db), which is invoked by start-from-env —
            # no separate migration Job. Connection details come from the
            # CNPG-generated secret `veron-db-app` (keys: username,
            # password, host, port, dbname, uri, jdbc-uri).
            - name: VERON_DB_HOST
              valueFrom: { secretKeyRef: { name: veron-db-app, key: host } }
            - name: VERON_DB_PORT
              valueFrom: { secretKeyRef: { name: veron-db-app, key: port } }
            - name: VERON_DB_NAME
              valueFrom: { secretKeyRef: { name: veron-db-app, key: dbname } }
            - name: VERON_DB_USER
              valueFrom: { secretKeyRef: { name: veron-db-app, key: username } }
            - name: VERON_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: veron-db-app, key: password } }
            - name: VERON_NATS_URL
              value: nats://nats.platform.svc.cluster.local:4222
          # Probe TN3270 (3270). Swank 4005 crashes a worker thread on
          # bare TCP probes (unhandled END-OF-FILE while reading the
          # slime-secret). veron's connection handler already swallows
          # pre-negotiation stream errors silently (see lispf), so a
          # tcp-socket probe against 3270 is both benign and noise-free.
          readinessProbe:
            tcpSocket: { port: 3270 }
            initialDelaySeconds: 30
            periodSeconds: 30
          livenessProbe:
            tcpSocket: { port: 3270 }
            initialDelaySeconds: 60
            periodSeconds: 60
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
      volumes:
        - name: tls
          secret:
            secretName: veron-tls
            defaultMode: 0440
        - name: slime-secret
          secret:
            secretName: veron-swank-secret
            defaultMode: 0440
            items:
              - key: slime-secret
                path: .slime-secret
