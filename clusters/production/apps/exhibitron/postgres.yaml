apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: exhibitron-db
  namespace: prod
spec:
  inheritedMetadata:
    annotations:
      resource.opentelemetry.io/service.name: exhibitron-db
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  storage:
    size: 20Gi
    storageClass: hcloud-volumes
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
  bootstrap:
    initdb:
      database: exhibitron
      owner: exhibitron
      postInitSQL:
        # Runs against the postgres (maintenance) db as superuser —
        # use it for cluster-level operations only.
        # exhibitron migrations include a PowerDNS block that does
        # `CREATE ROLE pdns`; grant CREATEROLE (not SUPERUSER) so
        # those migrations work.
        - ALTER USER exhibitron CREATEROLE
      postInitApplicationSQL:
        # Runs against the exhibitron db. MikroORM uses citext for
        # case-insensitive emails; must be installed in this db.
        - CREATE EXTENSION IF NOT EXISTS citext
  monitoring:
    enablePodMonitor: false
