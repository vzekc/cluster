apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: discourse-shared
  namespace: prod
spec:
  # ReadWriteOnce is fine because both discourse-web and discourse-sidekiq
  # are scheduled onto the same node by an inter-pod affinity rule on the
  # sidekiq Deployment. Scaling web horizontally would require either S3
  # uploads or a ReadWriteMany volume.
  accessModes: [ReadWriteOnce]
  storageClassName: hcloud-volumes
  resources:
    requests:
      storage: 50Gi
