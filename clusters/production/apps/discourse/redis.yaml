apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: discourse-redis
  namespace: prod
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: hcloud-volumes
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discourse-redis
  namespace: prod
  labels:
    app: discourse-redis
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app: discourse-redis
  template:
    metadata:
      labels:
        app: discourse-redis
      annotations:
        resource.opentelemetry.io/service.name: discourse-redis
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes", "--dir", "/data"]
          ports:
            - { name: redis, containerPort: 6379 }
          volumeMounts:
            - { name: data, mountPath: /data }
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: "50m",  memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: discourse-redis
---
apiVersion: v1
kind: Service
metadata:
  name: discourse-redis
  namespace: prod
spec:
  type: ClusterIP
  selector:
    app: discourse-redis
  ports:
    - { name: redis, port: 6379, targetPort: 6379 }
