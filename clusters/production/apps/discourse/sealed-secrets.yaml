---
# PLACEHOLDER — replace before merging.
#
# Generate the real sealed secret with cluster-infra/scripts/seal.sh:
#
#   scripts/seal.sh prod discourse-secrets \
#     DISCOURSE_SECRET_KEY_BASE="$(openssl rand -hex 64)" \
#     DISCOURSE_SMTP_PASSWORD='<smtp password>' \
#     > ../cluster/clusters/production/apps/discourse/sealed-secrets.yaml
#
# Required keys:
#   DISCOURSE_SECRET_KEY_BASE  — Rails secret_key_base; rotating it logs
#                                everyone out, so generate once and keep
#                                it stable.
#   DISCOURSE_SMTP_PASSWORD    — for mail.classic-computing.de relay.
#
# The CNPG operator owns discourse-db-app (DB credentials) — no entry
# needed here for those.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: discourse-secrets
  namespace: prod
spec:
  encryptedData: {}
  template:
    metadata:
      name: discourse-secrets
      namespace: prod
---
# PLACEHOLDER — replace before the woltlab-sync CronJob can run.
#
#   scripts/seal.sh prod discourse-woltlab-sync \
#     WOLTLAB_DB_PASSWORD='<mysql password>' \
#     SSH_PRIVATE_KEY="$(cat /var/discourse/.ssh/discourse-migration-key)" \
#     >> ../cluster/clusters/production/apps/discourse/sealed-secrets.yaml
#
# Required keys:
#   WOLTLAB_DB_PASSWORD — MySQL password for `discourse@forum.classic-computing.de`,
#                         currently in /etc/woltlab-sync.env on the docker host.
#   SSH_PRIVATE_KEY     — OpenSSH-format private key. Source on the docker host
#                         is /var/discourse/.ssh/discourse-migration-key (read by
#                         migrate.yml — it mounts as id_dsa, but it's actually
#                         an RSA key in modern OpenSSH; we mount it as id_rsa).
#                         The matching public key must already be in
#                         ~discourse/.ssh/authorized_keys on forum.classic-computing.de.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: discourse-woltlab-sync
  namespace: prod
spec:
  encryptedData: {}
  template:
    metadata:
      name: discourse-woltlab-sync
      namespace: prod
