---
# PLACEHOLDER — replace before merging.
#
# Generate the real sealed secret with cluster-infra/scripts/seal.sh:
#
#   scripts/seal.sh prod discourse-secrets \
#     DISCOURSE_SECRET_KEY_BASE="$(openssl rand -hex 64)" \
#     DISCOURSE_SMTP_PASSWORD='<smtp password>' \
#     > ../cluster/clusters/production/apps/discourse/sealed-secrets.yaml
#
# Required keys:
#   DISCOURSE_SECRET_KEY_BASE  — Rails secret_key_base; rotating it logs
#                                everyone out, so generate once and keep
#                                it stable.
#   DISCOURSE_SMTP_PASSWORD    — for mail.classic-computing.de relay.
#
# The CNPG operator owns discourse-db-app (DB credentials) — no entry
# needed here for those.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: discourse-secrets
  namespace: prod
spec:
  encryptedData: {}
  template:
    metadata:
      name: discourse-secrets
      namespace: prod
