apiVersion: apps/v1
kind: Deployment
metadata:
  name: discourse-web
  namespace: prod
  labels:
    app: discourse
    component: web
spec:
  replicas: 1
  # Recreate (not RollingUpdate) because /shared is ReadWriteOnce: a new
  # pod cannot mount the volume until the old one releases it.
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app: discourse
      component: web
  template:
    metadata:
      labels:
        app: discourse
        component: web
      annotations:
        resource.opentelemetry.io/service.name: discourse-web
    spec:
      enableServiceLinks: false
      containers:
        - name: web
          # Flux Image Automation rewrites the tag on this line when a
          # new ghcr.io/vzekc/discourse:stable-* image is pushed.
          image: ghcr.io/vzekc/discourse:stable # {"$imagepolicy": "flux-system:discourse"}
          imagePullPolicy: IfNotPresent
          env:
            - { name: DISCOURSE_ROLE, value: "web" }
            - { name: LANG,           value: "en_US.UTF-8" }
            - { name: LC_ALL,         value: "en_US.UTF-8" }
            - { name: UNICORN_WORKERS, value: "3" }
            - { name: DISCOURSE_HOSTNAME, value: "discourse.classic-computing.de" }
            - { name: DISCOURSE_DEVELOPER_EMAILS,
                value: "hans.huebner.vzekc@gmail.com,vorsitz@classic-computing.de" }
            - { name: DISCOURSE_DB_HOST,
                valueFrom: { secretKeyRef: { name: discourse-db-app, key: host } } }
            - { name: DISCOURSE_DB_PORT,
                valueFrom: { secretKeyRef: { name: discourse-db-app, key: port } } }
            - { name: DISCOURSE_DB_NAME,
                valueFrom: { secretKeyRef: { name: discourse-db-app, key: dbname } } }
            - { name: DISCOURSE_DB_USERNAME,
                valueFrom: { secretKeyRef: { name: discourse-db-app, key: username } } }
            - { name: DISCOURSE_DB_PASSWORD,
                valueFrom: { secretKeyRef: { name: discourse-db-app, key: password } } }
            - { name: DISCOURSE_REDIS_HOST,    value: "discourse-redis.prod.svc.cluster.local" }
            - { name: DISCOURSE_REDIS_PORT,    value: "6379" }
            - { name: DISCOURSE_SMTP_ADDRESS,  value: "mail.classic-computing.de" }
            - { name: DISCOURSE_SMTP_PORT,     value: "25" }
            - { name: DISCOURSE_SMTP_USER_NAME, value: "discourse" }
            - { name: DISCOURSE_SMTP_DOMAIN,   value: "discourse.classic-computing.de" }
            - { name: DISCOURSE_NOTIFICATION_EMAIL, value: "noreply@discourse.classic-computing.de" }
            - { name: DISCOURSE_SMTP_PASSWORD,
                valueFrom: { secretKeyRef: { name: discourse-secrets, key: DISCOURSE_SMTP_PASSWORD } } }
            - { name: DISCOURSE_SECRET_KEY_BASE,
                valueFrom: { secretKeyRef: { name: discourse-secrets, key: DISCOURSE_SECRET_KEY_BASE } } }
          ports:
            - { name: http, containerPort: 3000 }
          volumeMounts:
            - { name: shared, mountPath: /shared }
          readinessProbe:
            httpGet: { path: /srv/status, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: { path: /srv/status, port: 3000 }
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests: { cpu: "500m",  memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "3Gi" }
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: discourse-shared
